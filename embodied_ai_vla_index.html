// ===================== 工具函数 =====================
const VENUE_TAGS = {
  'ICLR 2026': {bg:'#e3f2fd',color:'#1565c0'},
  'NeurIPS 2025': {bg:'#fce4ec',color:'#c62828'},
  'CoRL 2025': {bg:'#f3e5f5',color:'#6a1b9a'},
  'CVPR 2025': {bg:'#e8f5e9',color:'#2e7d32'},
  'ICCV 2025': {bg:'#fff3e0',color:'#e65100'},
  'ICML 2025': {bg:'#e0f7fa',color:'#00695c'},
  'RSS 2025': {bg:'#fbe9e7',color:'#bf360c'},
  'ICLR 2025': {bg:'#e3f2fd',color:'#1565c0'},
  'ICRA 2025': {bg:'#f1f8e9',color:'#558b2f'},
};

function getAllPapers() {
  const out = [];
  for (const [cat, data] of Object.entries(P)) {
    for (const [venue, plist] of Object.entries(data.papers)) {
      for (const [title, url] of plist) {
        out.push({ title, url, venue, category: cat });
      }
    }
  }
  return out;
}

function countAll() {
  let total = 0;
  for (const data of Object.values(P)) {
    for (const plist of Object.values(data.papers)) total += plist.length;
  }
  let vla = 0;
  for (const data of Object.values(P)) {
    for (const plist of Object.values(data.papers)) {
      for (const [title] of plist) {
        if (title.includes('VLA') || title.includes('Vision-Language-Action')) vla++;
      }
    }
  }
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-vla').textContent = vla;
  return total;
}

// ===================== 渲染树形索引 =====================
function renderTree(filter) {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  let matchTotal = 0;

  for (const [cat, data] of Object.entries(P)) {
    // count papers in category
    let catCount = 0;
    for (const plist of Object.values(data.papers)) catCount += plist.length;

    const catDiv = document.createElement('div');
    catDiv.className = 'tree-item ' + data.cls;

    const toggle = document.createElement('div');
    toggle.className = 'tree-toggle';
    toggle.innerHTML =
      '<span class="arrow open">▶</span>' +
      '<span class="icon">' + data.icon + '</span>' +
      '<span class="label">' + cat + '</span>' +
      '<span class="count highlight">' + catCount + '</span>';
    catDiv.appendChild(toggle);

    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'tree-children open';

    let hasMatch = false;
    for (const [venue, plist] of Object.entries(data.papers)) {
      const filtered = filter
        ? plist.filter(function(x) { return x[0].toLowerCase().includes(filter.toLowerCase()); })
        : plist;
      if (filter && filtered.length === 0) continue;
      hasMatch = true;
      matchTotal += filtered.length;

      const venueDiv = document.createElement('div');
      venueDiv.className = 'tree-item';

      const vt = document.createElement('div');
      vt.className = 'tree-toggle';
      vt.style.paddingLeft = '20px';
      vt.innerHTML =
        '<span class="arrow open">▶</span>' +
        '<span class="label" style="font-size:12.5px;">' + venue + '</span>' +
        '<span class="count">' + filtered.length + '</span>';
      venueDiv.appendChild(vt);

      const papersDiv = document.createElement('div');
      papersDiv.className = 'tree-children open';
      for (const x of filtered) {
        const a = document.createElement('a');
        a.className = 'paper-link';
        a.href = x[1];
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = x[0];
        papersDiv.appendChild(a);
      }
      venueDiv.appendChild(papersDiv);

      (function(vtEl, pDiv) {
        vtEl.addEventListener('click', function() {
          vtEl.querySelector('.arrow').classList.toggle('open');
          pDiv.classList.toggle('open');
        });
      })(vt, papersDiv);

      childrenDiv.appendChild(venueDiv);
    }

    if (filter && !hasMatch) continue;
    catDiv.appendChild(childrenDiv);

    (function(toggleEl, childrenEl) {
      toggleEl.addEventListener('click', function() {
        toggleEl.querySelector('.arrow').classList.toggle('open');
        childrenEl.classList.toggle('open');
      });
    })(toggle, childrenDiv);

    tree.appendChild(catDiv);
  }

  if (filter) {
    document.getElementById('stat-total').textContent = matchTotal;
  }
}

// ===================== 渲染主内容区 =====================
function renderMain(filter, venueFilter) {
  const grid = document.getElementById('paper-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  let papers = getAllPapers();
  if (venueFilter) {
    papers = papers.filter(function(p) { return p.venue === venueFilter; });
  }
  if (filter) {
    var f = filter.toLowerCase();
    papers = papers.filter(function(p) {
      return p.title.toLowerCase().includes(f) || p.venue.toLowerCase().includes(f);
    });
  }

  if (papers.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  papers.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'paper-card';
    var tag = VENUE_TAGS[p.venue] || {bg:'#eceff1',color:'#37474f'};
    card.innerHTML =
      '<a class="paper-card-title" href="' + p.url + '" target="_blank" rel="noopener">' +
        hl(p.title, filter) + '</a>' +
      '<div class="paper-card-meta">' +
        '<span style="background:' + tag.bg + ';color:' + tag.color + ';padding:1px 7px;border-radius:4px;font-size:11px;font-weight:500;">' + p.venue + '</span>' +
        '<span>' + p.category.replace(/^\d+\.\s/, '') + '</span>' +
      '</div>';
    grid.appendChild(card);
  });
}

function hl(text, filter) {
  if (!filter) return text;
  var idx = text.toLowerCase().indexOf(filter.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="highlight">' + text.slice(idx, idx + filter.length) + '</span>' + text.slice(idx + filter.length);
}

// ===================== 搜索和筛选 =====================
function onSearch(val) {
  renderTree(val);
  var active = document.querySelector('.filter-btn.active');
  var vf = active && active.textContent !== 'All' ? active.textContent : '';
  renderMain(val, vf);
}

function renderFilterBar() {
  var bar = document.getElementById('filter-bar');
  var venues = ['All', 'ICLR 2026', 'NeurIPS 2025', 'CoRL 2025', 'CVPR 2025', 'ICCV 2025', 'ICLR 2025', 'ICML 2025', 'RSS 2025', 'ICRA 2025'];
  bar.innerHTML = '';
  venues.forEach(function(v) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (v === 'All' ? ' active' : '');
    btn.textContent = v;
    (function(vv) {
      btn.onclick = function() {
        var allBtns = document.querySelectorAll('.filter-btn');
        for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('active');
        btn.classList.add('active');
        renderMain(document.getElementById('search-input').value, vv === 'All' ? '' : vv);
      };
    })(v);
    bar.appendChild(btn);
  });
}

// ===================== 初始化 =====================
renderTree('');
renderFilterBar();
renderMain('', '');
countAll();
