<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLA 免真机 · 世界模型方向论文索引 (2025-2026)</title>
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --pink: #f778ba;
  --teal: #2dd4bf;
}
[data-theme="light"] {
  --bg: #ffffff;
  --bg-card: #f6f8fa;
  --bg-hover: #eaeef2;
  --border: #d0d7de;
  --text: #1f2328;
  --text-secondary: #636c76;
  --accent: #0969da;
  --accent-hover: #0550ae;
  --green: #1a7f37;
  --orange: #9a6700;
  --red: #cf222e;
  --purple: #8250df;
  --pink: #bf3989;
  --teal: #0d9488;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

/* Header */
header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 60px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
header h1 {
  color: #fff;
  font-size: 2.2em;
  margin-bottom: 12px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
header p {
  color: rgba(255,255,255,0.8);
  font-size: 1.05em;
  max-width: 700px;
  margin: 0 auto;
}
header .stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 25px;
  flex-wrap: wrap;
}
header .stat {
  color: rgba(255,255,255,0.9);
}
header .stat .num {
  font-size: 1.8em;
  font-weight: 700;
  display: block;
}
header .stat .label {
  font-size: 0.8em;
  opacity: 0.7;
}

/* Theme toggle */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  cursor: pointer;
  font-size: 1.3em;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: all 0.3s;
}
.theme-toggle:hover { transform: scale(1.1); }

/* Controls */
.controls {
  padding: 25px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.controls-inner {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 250px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95em;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.filter-btn {
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.filter-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* Paper grid */
.papers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
  padding: 25px 0 60px;
}
.paper-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.paper-card:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.paper-card .title {
  font-size: 1.02em;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text);
}
.paper-card .title a {
  color: inherit;
  text-decoration: none;
}
.paper-card .title a:hover { color: var(--accent-hover); }
.paper-card .desc {
  font-size: 0.85em;
  color: var(--text-secondary);
  line-height: 1.5;
  flex: 1;
}
.paper-card .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75em;
  font-weight: 600;
  white-space: nowrap;
}
.tag.venue-iclr { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
.tag.venue-cvpr { background: rgba(188,140,255,0.15); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); }
.tag.venue-iccv { background: rgba(247,120,186,0.15); color: var(--pink); border: 1px solid rgba(247,120,186,0.3); }
.tag.venue-neurips { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.tag.venue-corl { background: rgba(210,153,34,0.15); color: var(--orange); border: 1px solid rgba(210,153,34,0.3); }
.tag.venue-arxiv { background: rgba(139,148,158,0.15); color: var(--text-secondary); border: 1px solid rgba(139,148,158,0.3); }
.tag.venue-survey { background: rgba(45,212,191,0.15); color: var(--teal); border: 1px solid rgba(45,212,191,0.3); }
.tag.cat-wm { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }
.tag.cat-gen { background: rgba(188,140,255,0.12); color: var(--purple); border: 1px solid rgba(188,140,255,0.25); }
.tag.cat-sim { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
.tag.oral { background: rgba(210,153,34,0.2); color: var(--orange); border: 1px solid rgba(210,153,34,0.4); }
.tag.year { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.paper-card .links {
  display: flex;
  gap: 10px;
  font-size: 0.82em;
}
.paper-card .links a {
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.paper-card .links a:hover { text-decoration: underline; }

/* Section headers */
.section-header {
  grid-column: 1 / -1;
  margin-top: 20px;
  margin-bottom: 5px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  font-size: 1.3em;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-header .count {
  font-size: 0.6em;
  color: var(--text-secondary);
  font-weight: 400;
  background: var(--bg-card);
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.section-header:first-child { margin-top: 0; }

/* No results */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: 1.1em;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.85em;
}
footer a { color: var(--accent); text-decoration: none; }

/* Responsive */
@media (max-width: 768px) {
  .papers-grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.6em; }
  .controls-inner { flex-direction: column; align-items: stretch; }
  .filter-group { justify-content: center; }
}
</style>
</head>

<div class="container">

</div>

// State
let activeVenue = 'all';
let activeCat = 'all';
let searchTerm = '';

function getVenueClass(venue) {
  const map = {
    'ICLR 2026': 'iclr', 'CVPR 2025': 'cvpr', 'ICCV 2025': 'iccv',
    'NeurIPS 2025': 'neurips', 'arXiv': 'arxiv', 'Survey': 'survey'
  };
  return map[venue] || 'arxiv';
}

function getCatLabel(cat) {
  const map = { 'wm': '世界模型', 'gen': '生成模型', 'sim': '仿真环境' };
  return map[cat] || cat;
}

function renderPapers() {
  const grid = document.getElementById('papers-grid');
  const filtered = papers.filter(p => {
    if (activeVenue !== 'all' && p.venue !== activeVenue) return false;
    if (activeCat !== 'all' && p.cat !== activeCat) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return p.title.toLowerCase().includes(s) ||
             p.desc.toLowerCase().includes(s) ||
             p.venue.toLowerCase().includes(s);
    }
    return true;
  });

  // Group by venue
  const venueOrder = ['ICLR 2026', 'NeurIPS 2025', 'ICCV 2025', 'CVPR 2025', 'arXiv', 'Survey'];
  const grouped = {};
  venueOrder.forEach(v => { grouped[v] = []; });
  filtered.forEach(p => {
    if (!grouped[p.venue]) grouped[p.venue] = [];
    grouped[p.venue].push(p);
  });

  let html = '';
  let totalShown = 0;

  venueOrder.forEach(venue => {
    if (!grouped[venue] || grouped[venue].length === 0) return;
    totalShown += grouped[venue].length;
    html += `<div class="section-header">${venue} <span class="count">${grouped[venue].length} 篇</span></div>`;

    grouped[venue].forEach(p => {
      const venueClass = getVenueClass(p.venue);
      let links = '';
      if (p.arxiv) links += `<a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">📄 arXiv</a>`;
      if (p.project) links += `<a href="${p.project}" target="_blank">🔗 项目</a>`;
      if (!p.arxiv && !p.project) links = '<span style="color:var(--text-secondary);font-size:0.82em">暂无公开链接</span>';

      html += `
        <div class="paper-card">
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc}</div>
          <div class="tags">
            <span class="tag venue-${venueClass}">${p.venue}</span>
            <span class="tag cat-${p.cat}">${getCatLabel(p.cat)}</span>
            <span class="tag year">${p.year}</span>
            ${p.oral ? '<span class="tag oral">🏆 Oral</span>' : ''}
          </div>
          <div class="links">${links}</div>
        </div>
      `;
    });
  });

  if (filtered.length === 0) {
    html = '<div class="no-results">未找到匹配的论文，请调整搜索条件 🤔</div>';
  }

  grid.innerHTML = html;
  document.getElementById('stat-total').textContent = papers.length;
  const venues = new Set(papers.map(p => p.venue));
  document.getElementById('stat-venue').textContent = venues.size;
}

function filterPapers() {
  searchTerm = document.getElementById('search').value;
  renderPapers();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const filterType = btn.dataset.filter;
    const value = btn.dataset.value;
    document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (filterType === 'venue') activeVenue = value;
    if (filterType === 'cat') activeCat = value;
    renderPapers();
  });
});

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'light' ? '☀️' : '🌙';
  localStorage.setItem('theme', next);
}

const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') {
  document.documentElement.setAttribute('data-theme', 'light');
  document.querySelector('.theme-toggle').textContent = '☀️';
}

renderPapers();
</script>
